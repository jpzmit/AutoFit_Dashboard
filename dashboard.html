<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Fitter Dashboard</title>
    
    <script type="importmap">
        {
            "imports": {
                "firebase/app": "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js",
                "firebase/firestore": "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js"
            }
        }
    </script>
    
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            margin: 0;
            padding: 30px;
        }
        header {
            text-align: center;
            margin-bottom: 40px;
        }
        h1 {
            color: #2c3e50;
            margin-bottom: 5px;
        }
        .subtitle {
            color: #7f8c8d;
            font-size: 1.1em;
            margin-top: 0;
        }
        
        /* Grid Layout for the Cards */
        #dashboard-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        
        /* Card Styling */
        .card {
            background: white;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            transition: transform 0.2s, box-shadow 0.2s;
            border-top: 5px solid #4fc3f7;
        }
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 15px rgba(0,0,0,0.1);
        }
        .card h2 {
            margin: 0 0 5px 0;
            color: #2980b9;
        }
        .timestamp {
            font-size: 0.85em;
            color: #95a5a6;
            margin-bottom: 15px;
            border-bottom: 1px solid #ecf0f1;
            padding-bottom: 10px;
        }
        
        /* Inner List Styling */
        .item-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .item-list li {
            background: #fdfdfd;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            padding: 12px;
            margin-bottom: 10px;
            font-size: 0.95em;
        }
        .item-header {
            display: flex;
            justify-content: space-between;
            font-weight: bold;
            color: #2c3e50;
            margin-bottom: 5px;
        }
        .item-details {
            color: #555;
            font-size: 0.9em;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .tag {
            background: #e74c3c;
            color: white;
            font-size: 0.75em;
            padding: 3px 6px;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <header>
        <h1>Fitment Dashboard</h1>
        <p class="subtitle">Live Syncing from Mobile AR Scanner</p>
    </header>

    <div id="dashboard-container">
        <!-- Live data will populate here -->
        <p style="text-align: center; width: 100%; color: #95a5a6;">Connecting to database...</p>
    </div>

    <script type="module" src="dashboard.js"></script>
</body>
</html>
